
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1e3a5f;
  --coral:#e05a3a;
  --coral-light:#fdf0ec;
  --cream:#faf9f5;
  --green:#4a8c3f;
  --green-light:#eaf4e8;
  --gold:#f5a623;
  --border-r:14px;
}
body{background:var(--cream);font-family:'Segoe UI',system-ui,sans-serif;color:var(--navy)}
.wrap{max-width:640px;margin:0 auto;padding:0 0 3rem}

.hero{text-align:center;padding:2rem 1rem 1.25rem}
.hero-brand{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1.5px solid #e8e4dc;border-radius:30px;padding:5px 14px 5px 10px;margin-bottom:14px}
.hero-brand span{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:.04em}
.hero h1{font-size:clamp(20px,5vw,26px);font-weight:800;color:var(--navy);line-height:1.2;margin-bottom:8px}
.hero h1 em{color:var(--coral);font-style:normal}
.hero p{font-size:13px;color:#666;max-width:400px;margin:0 auto;line-height:1.6}

.flow-nav{display:flex;align-items:center;gap:0;padding:0 1rem 1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.flow-nav::-webkit-scrollbar{display:none}
.fpill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;background:#fff;border:1.5px solid #e0dbd0;border-radius:12px;padding:8px 11px;cursor:pointer;transition:all .18s;min-width:70px;-webkit-tap-highlight-color:transparent;text-align:center}
.fpill .pem{font-size:18px}
.fpill .plbl{font-size:10px;font-weight:700;color:#999;white-space:nowrap;line-height:1.3}
.fpill.active{border-color:var(--navy);background:var(--navy)}
.fpill.active .plbl{color:#fff}
.flow-arrow{font-size:14px;color:#ccc;flex-shrink:0;padding:0 4px;margin-bottom:12px}

.step-card{display:none;padding:0 1rem}
.step-card.visible{display:block}
.card{background:#fff;border-radius:var(--border-r);border:1.5px solid #e8e4dc;padding:1.25rem;margin-bottom:.875rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--coral)}

.shero{display:flex;gap:12px;align-items:flex-start;margin-bottom:1.1rem}
.shero-icon{width:46px;height:46px;min-width:46px;border-radius:12px;background:var(--coral-light);display:flex;align-items:center;justify-content:center;font-size:24px}
.shero-text h2{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:3px;line-height:1.3}
.stag{display:inline-block;background:var(--navy);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;margin-bottom:4px;letter-spacing:.05em}
.shero-text p{font-size:12px;color:#666;line-height:1.5}

.situation-wrap{display:flex;flex-direction:column;gap:8px;margin-top:.5rem}
.situation-btn{display:flex;align-items:center;gap:10px;background:#f9f8f4;border:1.5px solid #ece9e1;border-radius:11px;padding:11px 13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;text-align:left}
.situation-btn:active{background:#f0ede6}
.situation-btn.selected{border-color:var(--navy);background:#f0f4f8}
.situation-icon{font-size:20px;flex-shrink:0}
.situation-text strong{font-size:13px;font-weight:700;color:var(--navy);display:block;margin-bottom:2px}
.situation-text span{font-size:11px;color:#888;line-height:1.4}
.situation-check{margin-left:auto;width:20px;height:20px;border-radius:50%;border:2px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.situation-btn.selected .situation-check{background:var(--navy);border-color:var(--navy);color:#fff}
.sit-content{display:none;margin-top:1rem}
.sit-content.visible{display:block}

.slabel{font-size:9px;font-weight:800;letter-spacing:.1em;color:#bbb;text-transform:uppercase;margin-bottom:7px;margin-top:1.1rem;display:flex;align-items:center;gap:6px}
.slabel::after{content:'';flex:1;height:1px;background:#f0ede6}

.info-box{background:#f0f4f8;border-left:3px solid var(--navy);border-radius:0 10px 10px 0;padding:.85rem 1rem;margin-bottom:.875rem;font-size:12px;color:var(--navy);line-height:1.6}
.info-box strong{display:block;font-size:13px;margin-bottom:4px}

/* PRÉCÈDE BOX — mise en avant spéciale pour la cession */
.precede-box{background:linear-gradient(135deg,#f0f4f8,#e8f0fb);border:1.5px solid #c5d8f0;border-radius:12px;padding:.9rem 1rem;margin-bottom:1rem;display:flex;gap:10px;align-items:flex-start}
.precede-icon{font-size:20px;flex-shrink:0}
.precede-text strong{font-size:12px;font-weight:800;color:var(--navy);display:block;margin-bottom:3px}
.precede-text span{font-size:11px;color:#4a6080;line-height:1.5}

/* RENVOI BOX pour le module stress */
.renvoi-box{background:var(--green-light);border:1.5px solid #b8d4b5;border-radius:12px;padding:.9rem 1rem;margin-bottom:1rem;font-size:12px;color:var(--green);line-height:1.6}
.renvoi-box strong{display:block;font-size:13px;font-weight:800;margin-bottom:4px;color:var(--green)}

.exo-list{display:flex;flex-direction:column;gap:7px}
.exo-item{background:#f9f8f4;border:1.5px solid #ece9e1;border-radius:11px;overflow:hidden;transition:border-color .2s}
.exo-item.open{border-color:#b8d4b5}
.exo-head{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;user-select:none}
.exo-head:active{background:#f0ede6}
.exo-item.open .exo-head{background:var(--green-light)}
.exo-num{width:22px;height:22px;min-width:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.exo-item.open .exo-num{background:var(--green)}
.exo-title{flex:1;font-size:13px;font-weight:600;color:var(--navy);line-height:1.3}
.exo-item.open .exo-title{color:var(--green)}
.exo-badge{font-size:9px;font-weight:700;background:var(--coral-light);color:var(--coral);padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-right:4px}
.exo-toggle{display:flex;align-items:center;gap:4px;background:var(--navy);color:#fff;font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;flex-shrink:0;transition:all .2s;white-space:nowrap}
.exo-item.open .exo-toggle{background:var(--green)}
.exo-arrow{display:inline-block;transition:transform .25s;font-style:normal;font-size:10px}
.exo-item.open .exo-arrow{transform:rotate(180deg)}
.exo-body{padding:0 12px 12px 43px;font-size:12px;color:#555;line-height:1.65;display:none}
.exo-body.open{display:block}
.exo-tip{background:var(--green-light);border-left:3px solid var(--green);border-radius:0 6px 6px 0;padding:6px 9px;margin-top:8px;font-size:11px;color:var(--green);font-weight:500;line-height:1.5}

.exo-check-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding:6px 0 0;border-top:1px solid #e8e4dc;cursor:pointer;-webkit-tap-highlight-color:transparent}
.exo-check-box{width:18px;height:18px;min-width:18px;border-radius:5px;border:2px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.exo-check-row.done .exo-check-box{background:var(--green);border-color:var(--green);color:#fff}
.exo-check-row label{font-size:11px;color:#888;cursor:pointer;line-height:1.3}
.exo-check-row.done label{color:var(--green);text-decoration:line-through}

.cta-banner{background:var(--navy);border-radius:var(--border-r);padding:1.1rem;margin-top:1.25rem;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.cta-banner::after{content:'🐾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:40px;opacity:.08;pointer-events:none}
.ctag{font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
.cta-title{font-size:13px;font-weight:800;color:#fff;line-height:1.4}
.cta-desc{font-size:11px;color:rgba(255,255,255,.65);line-height:1.5}
.cta-btn{display:inline-flex;align-items:center;gap:5px;background:var(--gold);color:var(--navy);font-size:12px;font-weight:800;padding:9px 16px;border-radius:25px;border:none;cursor:pointer;align-self:flex-start;text-decoration:none;-webkit-tap-highlight-color:transparent}
.cta-btn:active{opacity:.9}

.nav-row{display:flex;gap:8px;margin-top:.875rem}
.nbtn{flex:1;padding:11px 12px;border-radius:11px;border:1.5px solid #e0dbd0;background:#fff;color:var(--navy);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.nbtn:active{background:#f5f3ef}
.nbtn:disabled{opacity:.3;cursor:default}
.nbtn.next{background:var(--navy);color:#fff;border-color:var(--navy)}
</style>

<div class="wrap">
<div class="hero">
  <div class="hero-brand">
    <span style="font-size:17px">🐾</span>
    <span>DOGS & US · Module gratuit</span>
  </div>
  <h1>Marche en laisse<br><em>sans tirer</em> 🦮</h1>
  <p>Comprends pourquoi ton chien tire, identifie ta situation et suis les exercices adaptés.</p>
</div>

<div class="flow-nav" id="fnav"></div>
<div id="scards"></div>
</div>

<script>
const SKOOL='https://www.skool.com/lacademie-dogs-us-8505/classroom';
const COACHING='https://www.skool.com/lacademie-dogs-us-8505/classroom';

const CESSION={
  id:'cession',
  title:"La cession à la pression",
  badge:"À faire à la maison",
  body:"Équipe ton chien de son harnais ou collier. Tiens la laisse et exerce une légère tension d'un côté — pas un coup sec, juste une pression douce et constante. Attends sans rien dire. Dès que ton chien se décale légèrement dans le sens de la pression ou la libère de lui-même → récompense immédiatement. Il apprend ainsi que céder à une pression = quelque chose de positif. C'est la base de toute la sensibilité à la laisse.",
  tip:"Cet exercice se fait au calme à la maison, quelques minutes par jour. Il peut précéder tous les autres exercices de marche en laisse — c'est un excellent point de départ."
};

const steps=[
  {
    id:'pourquoi',label:"Pourquoi ?",emoji:"🔍",
    title:"Pourquoi mon chien tire en laisse ?",
    tag:"COMPRENDRE D'ABORD",
    intro:"Avant de travailler la marche en laisse, il est essentiel de comprendre la raison pour laquelle ton chien tire. Ce n'est jamais par méchanceté — c'est toujours une communication. Il y a trois grandes situations, et les solutions sont différentes pour chacune.",
    situations:[
      {id:'habitude',icon:'🔄',title:"Il tire par habitude",desc:"Depuis toujours, tirer a fonctionné pour lui"},
      {id:'distraction',icon:'👀',title:"Il tire pour les distractions",desc:"Chiens, odeurs, vélos... il veut tout explorer"},
      {id:'stress',icon:'😰',title:"Il tire par stress",desc:"L'environnement le dépasse et le met mal à l'aise"}
    ]
  },
  {
    id:'habitude',label:"Habitude",emoji:"🔄",
    title:"Il tire par habitude",
    tag:"SITUATION 1",
    intro:"Pendant des mois ou des années, ton chien a appris que tirer = avancer. C'est une habitude ancrée profondément. La bonne nouvelle : ça se corrige. La moins bonne : il faudra de la constance et de la patience — le chien doit désapprendre quelque chose qu'il a pratiqué très longtemps.",
    infoBox:"⏳ Sois indulgent avec toi-même et avec lui. Plus l'habitude est ancienne, plus la rééducation prend du temps. C'est normal, c'est pas un échec — c'est juste de la constance.",
    exercises:[
      CESSION,
      {
        id:'h1',title:"La technique Stop & Go",
        body:"Équipe ton chien d'un harnais confortable. Lance une croquette dans une pièce calme ou dans le jardin. Dès qu'il tire pour y aller → tu t'arrêtes complètement. Tu ne demandes rien, tu attends. Dès qu'il revient vers toi et détend la laisse → récompense et avance d'un petit pas. S'il tire à nouveau → stop. Répète jusqu'à ce qu'il comprenne que marcher à tes côtés = avancer.",
        tip:"Commence toujours dans un endroit très calme, sans distractions. Le jardin ou une pièce de la maison sont parfaits pour débuter."
      },
      {
        id:'h2',title:"Transférer en extérieur",
        body:"Une fois que ça marche à la maison, passe dans un parc tranquille. Même exercice : chaque traction = arrêt. Laisse détendue + regard vers toi = on avance. Si le chien marche doucement à tes côtés spontanément = récompense bonus.",
        tip:"Ne saute pas les étapes. Un parc calme d'abord, avant de tenter les rues animées."
      },
      {
        id:'h3',title:"La constance au quotidien",
        body:"C'est sur chaque balade que ça se joue. Pas besoin d'une séance formelle — juste appliquer la règle à chaque fois : il tire, tu t'arrêtes. Et les balades où tu n'as vraiment pas le temps ? C'est humain, ça arrive. Fais le mieux que tu peux. C'est la régularité globale qui compte, pas la perfection à chaque sortie.",
        tip:"Un jour raté ne ruine pas les progrès. Ce qui compte c'est la tendance générale sur plusieurs semaines."
      }
    ],
    cta:{tag:"🎬 Formation Dogs & Us",title:"Tu veux voir ces exercices filmés en situation réelle ?",desc:"Dans la formation, chaque exercice est démontré en vidéo avec un vrai chien. Voir le timing exact et les bons gestes change tout.",label:"Accéder aux vidéos de la formation →"}
  },
  {
    id:'distraction',label:"Distraction",emoji:"👀",
    title:"Il tire pour les distractions",
    tag:"SITUATION 2",
    intro:"Ton chien tire uniquement quand quelque chose l'attire — un congénère, une odeur, un vélo. Entre les distractions, il marche normalement. Bonne nouvelle : la connexion avec toi existe déjà par moments. C'est ça qu'on va développer.",
    infoBox:"✨ Si tu observes déjà des moments en balade où ton chien marche tranquillement à tes côtés sans que tu aies rien demandé — récompense-le ! Même sans avoir fait les exercices, renforcer ces moments naturels est crucial. Il comprend ainsi que rester connecté à toi est quelque chose de précieux.",
    exercises:[
      CESSION,
      {
        id:'d1',title:"Stop à chaque distraction",
        body:"Dès que ton chien tire vers quelque chose → tu t'arrêtes. Peu importe la distraction. Tu ne tires pas en arrière, tu attends. Laisse détendue + regard vers toi → on continue. Si il marche doucement vers ce qui l'intéresse → récompense en approchant calmement. Reste cohérent : sur un trottoir étroit ou lors d'un croisement, on ne reste pas figé non plus. Le bon sens prime.",
        tip:"La distraction devient une récompense naturelle si l'approche se fait calmement. Tirer ne raccourcit jamais le chemin."
      },
      {
        id:'d2',title:"Capturer les bons moments",
        body:"Quand ton chien marche naturellement sans tirer, même 3 secondes → marque d'un « Oui ! » et récompense. C'est ce qu'on appelle la capture : tu renforces un comportement spontané. Pas besoin de le provoquer — juste être attentif et saisir l'instant dès qu'il se présente.",
        tip:"La capture est très puissante car le chien choisit librement le bon comportement. Ce qu'il choisit seul, il le répète plus facilement."
      }
    ],
    cta:{tag:"🎬 Formation Dogs & Us",title:"Tu veux voir ces exercices filmés en situation réelle ?",desc:"Dans la formation, chaque exercice est démontré en vidéo avec un vrai chien. Voir le timing exact et les bons gestes change tout.",label:"Accéder aux vidéos de la formation →"}
  },
  {
    id:'stress',label:"Stress",emoji:"😰",
    title:"Il tire par stress",
    tag:"SITUATION 3",
    intro:"Ton chien est submergé par l'environnement. La rue, les bruits, les passants — tout le dépasse. Il tire constamment, pas par envie d'explorer, mais parce qu'il est en état de survie. Dans cet état, il n'apprend rien. La priorité est de le sécuriser avant tout.",
    infoBox:"🧠 Un chien stressé n'est pas capable d'apprendre. Inutile de répéter des commandes ou d'insister sur des exercices quand il est dans le rouge. D'abord l'aider à redescendre, ensuite travailler.",
    renvoiBox:"📋 Les exercices des deux situations précédentes (Stop & Go, Capturer les bons moments, Cession à la pression) s'appliquent ici aussi. La différence majeure : l'environnement dans lequel tu les pratiques. Voici les points spécifiques au stress à garder en tête.",
    exercises:[
      {
        id:'s1',title:"Travailler dans des zones sûres d'abord",
        body:"Commence les exercices de marche uniquement dans des endroits où ton chien est à l'aise : jardin, rue calme, parc peu fréquenté. Il doit être en dessous de son seuil de stress pour pouvoir apprendre quoi que ce soit. Une fois que ça fonctionne bien dans ces zones → introduis progressivement des environnements un peu plus stimulants.",
        tip:"Choisir le bon endroit, c'est déjà 50% du travail. Ne grille pas les étapes."
      },
      {
        id:'s2',title:"Tester la connexion en environnement difficile",
        body:"Quand tu introduis un endroit plus stressant, commence par demander une commande de base (assis, regard) pour évaluer le niveau de connexion avec toi. S'il répond → l'environnement est gérable, tu peux travailler 5 minutes max puis stop. S'il ne répond pas du tout → c'est trop fort pour lui aujourd'hui. On recule, on ne force pas.",
        tip:"5 minutes dans un endroit difficile bien gérées valent mieux qu'une heure à subir."
      },
      {
        id:'s3',title:"Récompenser la connexion naturelle",
        body:"Dès que ton chien te regarde spontanément en balade, ou colle à tes pieds naturellement → récompense immédiatement. Utilise des récompenses basse énergie : une croquette simple, une voix calme et douce. Pas de fête exubérante qui risque de sur-exciter.",
        tip:"La récompense vocale calme est souvent plus adaptée pour un chien stressé qu'une friandise très appétente."
      }
    ],
    cta:{tag:"📞 Coaching individuel",title:"Le stress en balade est un sujet complexe et très personnel.",desc:"Chaque chien est différent. Un coaching 1-1 avec Chloé permet d'analyser précisément la situation de ton chien et de construire un plan adapté.",label:"Réserver un coaching individuel →",url:COACHING}
  }
];

let current=0;
let selectedSituation=null;
const exoOpen={};
const exoChecked={};

// Init states
[CESSION,...steps.filter(s=>s.exercises).flatMap(s=>s.exercises)].forEach(e=>{
  if(e&&e.id){exoOpen[e.id]=false;exoChecked[e.id]=false;}
});

function renderNav(){
  const nav=document.getElementById('fnav');
  nav.innerHTML='';
  steps.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='fpill'+(i===current?' active':'');
    el.innerHTML=`<span class="pem">${s.emoji}</span><span class="plbl">${s.label}</span>`;
    el.onclick=()=>{current=i;if(i===0)selectedSituation=null;render();};
    nav.appendChild(el);
    if(i<steps.length-1){
      const arr=document.createElement('span');
      arr.className='flow-arrow';arr.textContent='›';
      nav.appendChild(arr);
    }
  });
  setTimeout(()=>{
    const active=nav.querySelector('.active');
    if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
}

function renderCards(){
  const wrap=document.getElementById('scards');
  wrap.innerHTML='';

  steps.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='step-card'+(i===current?' visible':'');

    if(s.id==='pourquoi'){
      div.innerHTML=`
        <div class="card">
          <div class="shero">
            <div class="shero-icon">${s.emoji}</div>
            <div class="shero-text">
              <span class="stag">${s.tag}</span>
              <h2>${s.title}</h2>
              <p>${s.intro}</p>
            </div>
          </div>
          <div class="slabel">Quelle est ta situation ?</div>
          <div class="situation-wrap">
            ${s.situations.map(sit=>`
              <div class="situation-btn${selectedSituation===sit.id?' selected':''}" data-sit="${sit.id}">
                <span class="situation-icon">${sit.icon}</span>
                <div class="situation-text"><strong>${sit.title}</strong><span>${sit.desc}</span></div>
                <div class="situation-check">${selectedSituation===sit.id?'✓':''}</div>
              </div>
            `).join('')}
          </div>
          <div class="sit-content${selectedSituation?' visible':''}" id="sit-cta">
            ${selectedSituation?`<div class="nav-row" style="margin-top:1.25rem"><button class="nbtn next" id="go-sit">Voir les exercices →</button></div>`:''}
          </div>
        </div>`;
    } else {
      const exos=s.exercises||[];
      div.innerHTML=`
        <div class="card">
          <div class="shero">
            <div class="shero-icon">${s.emoji}</div>
            <div class="shero-text">
              <span class="stag">${s.tag}</span>
              <h2>${s.title}</h2>
              <p>${s.intro}</p>
            </div>
          </div>

          ${s.infoBox?`<div class="info-box">${s.infoBox}</div>`:''}
          ${s.renvoiBox?`<div class="renvoi-box"><strong>📋 Les exercices des situations précédentes s'appliquent aussi ici</strong>${s.renvoiBox.replace('📋 ','').replace('Les exercices des deux situations précédentes (Stop &amp; Go, Capturer les bons moments, Cession à la pression) s\'appliquent ici aussi. La différence majeure : l\'environnement dans lequel tu les pratiques. Voici les points spécifiques au stress à garder en tête.','La différence majeure : l\'environnement dans lequel tu les pratiques. Les exercices Stop &amp; Go, Capturer les bons moments et Cession à la pression restent les mêmes — voici les points spécifiques au stress à garder en tête.')}</div>`:''}

          <div class="precede-box">
            <span class="precede-icon">🏠</span>
            <div class="precede-text">
              <strong>Commence toujours par la cession à la pression</strong>
              <span>Cet exercice calme, à faire à la maison, prépare ton chien à tous ceux qui suivent. C'est le meilleur point de départ.</span>
            </div>
          </div>

          <div class="slabel">Exercices</div>
          <div class="exo-list">
            ${exos.map((e,ei)=>`
              <div class="exo-item${exoOpen[e.id]?' open':''}" data-exo="${e.id}">
                <div class="exo-head">
                  <div class="exo-num">${ei+1}</div>
                  <span class="exo-title">${e.title}</span>
                  ${e.badge?`<span class="exo-badge">${e.badge}</span>`:''}
                  <span class="exo-toggle">${exoOpen[e.id]?'Fermer':'Voir'}<em class="exo-arrow"> ▼</em></span>
                </div>
                <div class="exo-body${exoOpen[e.id]?' open':''}">
                  ${e.body}
                  ${e.tip?`<div class="exo-tip">💡 ${e.tip}</div>`:''}
                  <div class="exo-check-row${exoChecked[e.id]?' done':''}" data-chk="${e.id}">
                    <div class="exo-check-box">${exoChecked[e.id]?'✓':''}</div>
                    <label>J'ai testé cet exercice ✓</label>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="cta-banner">
            <span class="ctag">${s.cta.tag}</span>
            <span class="cta-title">${s.cta.title}</span>
            <span class="cta-desc">${s.cta.desc}</span>
            <a class="cta-btn" href="${s.cta.url||SKOOL}" target="_blank">🎬 ${s.cta.label}</a>
          </div>

          <div class="nav-row">
            <button class="nbtn" id="prev-${i}" ${i<=1?'disabled':''}>← Précédent</button>
            <button class="nbtn next" id="next-${i}" ${i===steps.length-1?'disabled':''}>Suivant →</button>
          </div>
        </div>`;
    }
    wrap.appendChild(div);
  });

  document.querySelectorAll('.situation-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{selectedSituation=btn.dataset.sit;render();});
  });

  const goBtn=document.getElementById('go-sit');
  if(goBtn){
    goBtn.onclick=()=>{
      const idx=steps.findIndex(s=>s.id===selectedSituation);
      if(idx>-1){current=idx;render();window.scrollTo({top:0,behavior:'smooth'});}
    };
  }

  document.querySelectorAll('.exo-item').forEach(item=>{
    item.querySelector('.exo-head').addEventListener('click',()=>{
      const id=item.dataset.exo;
      exoOpen[id]=!exoOpen[id];
      render();
    });
  });

  document.querySelectorAll('.exo-check-row').forEach(row=>{
    row.addEventListener('click',e=>{
      e.stopPropagation();
      const id=row.dataset.chk;
      exoChecked[id]=!exoChecked[id];
      render();
    });
  });

  for(let i=1;i<steps.length;i++){
    const p=document.getElementById('prev-'+i);
    const n=document.getElementById('next-'+i);
    if(p&&!p.disabled) p.onclick=()=>{current=0;selectedSituation=null;render();window.scrollTo({top:0,behavior:'smooth'});};
    if(n&&!n.disabled) n.onclick=()=>{
      const ids=[null,'habitude','distraction','stress'];
      const nextId=ids[i+1];
      if(nextId){const idx=steps.findIndex(s=>s.id===nextId);if(idx>-1){current=idx;render();window.scrollTo({top:0,behavior:'smooth'});}}
    };
  }
}

function render(){renderNav();renderCards();}
render();
</script>
